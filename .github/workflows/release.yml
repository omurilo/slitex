name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Build the React frontend once ─────────────────────────────────────────
  build-web:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload UI dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist/
          retention-days: 1

  # ── 2. Cross-compile Go binary for every target platform ─────────────────────
  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: build-web
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: slitex_linux_amd64
          - goos: linux
            goarch: arm64
            asset: slitex_linux_arm64
          - goos: darwin
            goarch: amd64
            asset: slitex_darwin_amd64
          - goos: darwin
            goarch: arm64
            asset: slitex_darwin_arm64
          - goos: windows
            goarch: amd64
            asset: slitex_windows_amd64.exe
          - goos: windows
            goarch: arm64
            asset: slitex_windows_arm64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ${{ matrix.asset }} \
            ./cmd/slitex

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  # ── 3. Create GitHub Release and attach all binaries ─────────────────────────
  release:
    name: Publish GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: slitex_*
          merge-multiple: true
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/*
