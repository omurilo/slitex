<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#00a4d4"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#00a4d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="100" rx="10" fill="#0d0d0d"/>

  <!-- Slide icon -->
  <rect x="14" y="20" width="60" height="60" rx="5" fill="none" stroke="url(#g)" stroke-width="2"/>
  <!-- Title bar inside slide -->
  <rect x="20" y="25" width="48" height="9" rx="2" fill="url(#g)" opacity="0.75"/>
  <!-- Content lines -->
  <rect x="20" y="42" width="44" height="3" rx="1.5" fill="white" opacity="0.40"/>
  <rect x="20" y="50" width="36" height="3" rx="1.5" fill="white" opacity="0.28"/>
  <rect x="20" y="58" width="40" height="3" rx="1.5" fill="white" opacity="0.20"/>
  <rect x="20" y="66" width="28" height="3" rx="1.5" fill="white" opacity="0.14"/>

  <!-- "sli" — white, serif -->
  <text x="87" y="76"
        font-family="Georgia,'Times New Roman',serif"
        font-size="54"
        fill="white"
        letter-spacing="-1">sli</text>

  <!-- "T" of TeX — gradient -->
  <text x="148" y="76"
        font-family="Georgia,'Times New Roman',serif"
        font-size="54"
        fill="url(#gh)">T</text>

  <!-- "E" of TeX — raised ~13 px, smaller (40 px) -->
  <text x="181" y="63"
        font-family="Georgia,'Times New Roman',serif"
        font-size="40"
        fill="url(#gh)">E</text>

  <!-- "X" of TeX — gradient, same baseline -->
  <text x="206" y="76"
        font-family="Georgia,'Times New Roman',serif"
        font-size="54"
        fill="url(#gh)">X</text>
</svg>
